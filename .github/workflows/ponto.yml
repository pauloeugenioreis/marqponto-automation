name: Batida de Ponto MarqPonto

on:
  # schedule desativado — usando cron na VPS (DigitalOcean)
  # schedule:
  #   # Horários em UTC (Brasília = UTC-03:00)
  #   # 10:00 BRT = 13:00 UTC
  #   # 13:00 BRT = 16:00 UTC
  #   # 14:00 BRT = 17:00 UTC
  #   # 19:00 BRT = 22:00 UTC
  #   - cron: '0 13 * * 1-5'  # 10:00 Brasília (Seg-Sex)
  #   - cron: '0 16 * * 1-5'  # 13:00 Brasília (Seg-Sex)
  #   - cron: '0 17 * * 1-5'  # 14:00 Brasília (Seg-Sex)
  #   - cron: '0 22 * * 1-5'  # 19:00 Brasília (Seg-Sex)

  # Permite executar manualmente pelo GitHub
  workflow_dispatch:

jobs:
  bater-ponto:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull container image (TZ America/Manaus)
        run: docker pull ghcr.io/pauloeugenioreis/marqponto-automation:tz-manaus

      - name: Run ponto automation (inside container)
        env:
          SISTEMA_PONTO: ${{ vars.SISTEMA_PONTO }}
          LOGIN_URL: ${{ vars.LOGIN_URL }}
          PONTO_URL: ${{ vars.PONTO_URL }}
          GEO_LAT_SEG_TER_QUA: ${{ vars.GEO_LAT_SEG_TER_QUA }}
          GEO_LNG_SEG_TER_QUA: ${{ vars.GEO_LNG_SEG_TER_QUA }}
          GEO_LAT_QUI_SEX: ${{ vars.GEO_LAT_QUI_SEX }}
          GEO_LNG_QUI_SEX: ${{ vars.GEO_LNG_QUI_SEX }}
          HEADLESS: ${{ vars.HEADLESS }}
          DEBUG: ${{ vars.DEBUG }}
          DRY_RUN: ${{ vars.DRY_RUN }}
          MARQPONTO_USER: ${{ secrets.MARQPONTO_USER }}
          MARQPONTO_PASS: ${{ secrets.MARQPONTO_PASS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_GIST_TOKEN: ${{ secrets.GH_GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          CI: 'true'
        run: |
          mkdir -p logs
          docker run --rm \
            -e SISTEMA_PONTO \
            -e LOGIN_URL \
            -e PONTO_URL \
            -e GEO_LAT_SEG_TER_QUA \
            -e GEO_LNG_SEG_TER_QUA \
            -e GEO_LAT_QUI_SEX \
            -e GEO_LNG_QUI_SEX \
            -e HEADLESS \
            -e DEBUG \
            -e DRY_RUN \
            -e MARQPONTO_USER \
            -e MARQPONTO_PASS \
            -e TELEGRAM_BOT_TOKEN \
            -e TELEGRAM_CHAT_ID \
            -e GH_GIST_TOKEN \
            -e GIST_ID \
            -e CI \
            -v "${PWD}/logs:/app/logs" \
            ghcr.io/pauloeugenioreis/marqponto-automation:tz-manaus

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: logs/debug-*.png
          retention-days: 3
          if-no-files-found: ignore
